<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud URL Shortener</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      min-height:100vh;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display:flex;
      justify-content:center;
      align-items:center;
      padding:30px;
    }

    .container{
      width:100%;
      max-width:700px;
      background:white;
      border-radius:20px;
      padding:40px;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
    }

    h1{
      text-align:center;
      margin-bottom:10px;
      color:#333;
    }

    .subtitle{
      text-align:center;
      color:gray;
      margin-bottom:25px;
    }

    .input-group{
      display:flex;
      gap:10px;
      margin-bottom:20px;
    }

    input{
      flex:1;
      padding:15px;
      border:none;
      border-radius:12px;
      background:#f1f1f1;
      font-size:16px;
    }

    button{
      padding:15px 25px;
      border:none;
      border-radius:12px;
      background:linear-gradient(135deg,#667eea,#764ba2);
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      transform:scale(1.03);
      opacity:0.9;
    }

    .card{
      background:#f7f7f7;
      padding:15px;
      border-radius:12px;
      margin-bottom:10px;
      border-left:5px solid #764ba2;
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-3px);
    }

    .card p{
      margin:5px 0;
      color:#333;
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>Cloud URL Shortener</h1>
    <p class="subtitle">AWS DynamoDB Integration</p>

    <div class="input-group">
      <input type="text" id="id" placeholder="Masukkan ID">
      <input type="text" id="nama" placeholder="Masukkan URL">
      <button onclick="tambahData()">Tambah Data</button>
    </div>

    <div id="data-list"></div>

  </div>

  <script>

    async function tambahData() {

      const id = document.getElementById("id").value;
      const nama = document.getElementById("nama").value;

      await fetch("http://localhost:3000/add", {
        method:"POST",
        headers:{
          "Content-Type":"application/json"
        },
        body:JSON.stringify({ id, nama })
      });

      alert("Data berhasil ditambahkan!");

      document.getElementById("id").value = "";
      document.getElementById("nama").value = "";

      loadData();
    }

    async function loadData() {

      const response = await fetch("http://localhost:3000/data");
      const data = await response.json();

      const list = document.getElementById("data-list");

      list.innerHTML = "";

      data.forEach(item => {

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <p><strong>ID:</strong> ${item.id}</p>
          <p><strong>URL:</strong> ${item.nama}</p>
        `;

        list.appendChild(card);

      });

    }

    loadData();

  </script>

</body>
</html>
