<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud URL Shortener</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      min-height:100vh;
      background:linear-gradient(135deg,#667eea,#764ba2);
      display:flex;
      justify-content:center;
      align-items:center;
      padding:30px;
    }

    .container{
      width:100%;
      max-width:700px;
      background:white;
      border-radius:20px;
      padding:40px;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
    }

    h1{
      text-align:center;
      color:#333;
      margin-bottom:10px;
    }

    .subtitle{
      text-align:center;
      color:gray;
      margin-bottom:30px;
    }

    .input-group{
      display:flex;
      gap:10px;
      margin-bottom:20px;
    }

    input{
      flex:1;
      padding:15px;
      border:none;
      border-radius:12px;
      background:#f1f1f1;
      font-size:16px;
    }

    button{
      padding:15px 25px;
      border:none;
      border-radius:12px;
      background:linear-gradient(135deg,#667eea,#764ba2);
      color:white;
      cursor:pointer;
      font-size:16px;
      transition:0.3s;
    }

    button:hover{
      transform:scale(1.03);
      opacity:0.9;
    }

    .result{
      margin-top:20px;
      background:#f7f7f7;
      padding:15px;
      border-radius:12px;
      word-wrap:break-word;
      display:none;
    }

    .result a{
      color:#764ba2;
      text-decoration:none;
      font-weight:bold;
    }

    .card{
      background:#f7f7f7;
      padding:15px;
      border-radius:12px;
      margin-top:15px;
      border-left:5px solid #764ba2;
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-3px);
    }

    .card p{
      margin:5px 0;
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>Cloud URL Shortener</h1>
    <p class="subtitle">AWS EC2 + DynamoDB Integration</p>

    <div class="input-group">
      <input type="text" id="urlInput" placeholder="Masukkan URL panjang...">
      <button onclick="shortenUrl()">Shorten</button>
    </div>

    <div class="result" id="resultBox">
      <p><strong>Short URL:</strong></p>
      <a id="shortUrl" target="_blank"></a>
    </div>

    <div id="history"></div>

  </div>

  <script>

    async function shortenUrl(){

      const originalUrl = document.getElementById("urlInput").value;

      if(!originalUrl){
        alert("Masukkan URL terlebih dahulu!");
        return;
      }

      const response = await fetch("/shorten", {
        method:"POST",
        headers:{
          "Content-Type":"application/json"
        },
        body:JSON.stringify({ originalUrl })
      });

      const data = await response.json();

      document.getElementById("resultBox").style.display = "block";

      const shortUrlElement = document.getElementById("shortUrl");

      shortUrlElement.href = data.shortUrl;
      shortUrlElement.textContent = data.shortUrl;

      document.getElementById("urlInput").value = "";

      loadHistory();

    }

    async function loadHistory(){

      const response = await fetch("/api/data");
      const data = await response.json();

      const history = document.getElementById("history");

      history.innerHTML = "";

      data.reverse().forEach(item => {

        const shortLink = `http://13.229.59.129:3000/${item.id}`;

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <p><strong>Original URL:</strong> ${item.nama}</p>
          <p><strong>Short URL:</strong> <a href="${shortLink}" target="_blank">${shortLink}</a></p>
        `;

        history.appendChild(card);

      });

    }

    loadHistory();

  </script>

</body>
</html>
